<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- border frame -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#3a2e1a" stroke-width="2"/>
  <!-- accent top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#topbar)"/>
  <defs>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="40%" stop-color="#F5D98B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- tagline -->
  <text x="80" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#8B7548" letter-spacing="8" text-transform="uppercase">TIMECHAIN · FREE NEWSLETTER</text>
  <!-- main title -->
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="600" fill="url(#title)">Timechain</text>
  <text x="80" y="420" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="600" fill="url(#title)">Insights</text>
  <!-- description -->
  <text x="80" y="520" font-family="monospace, 'Courier New', Courier" font-size="24" fill="#666">On-chain analysis · epoch by epoch · no tracking · timechaingraph.com</text>
  <!-- corner mark -->
  <text x="1120" y="590" font-family="monospace" font-size="18" fill="#3a2e1a" text-anchor="end">⛓</text>
</svg>
