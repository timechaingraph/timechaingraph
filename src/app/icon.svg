<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Timechain Graph — circular brass annulus with halving notches, force-directed nodes, gold ₿ center -->
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255, 215, 0, 0.32)"/>
      <stop offset="60%" stop-color="rgba(255, 215, 0, 0.10)"/>
      <stop offset="100%" stop-color="rgba(0, 0, 0, 0)"/>
    </radialGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0A656"/>
      <stop offset="50%" stop-color="#C28840"/>
      <stop offset="100%" stop-color="#8C5E29"/>
    </linearGradient>
  </defs>
  <!-- Background disc -->
  <circle cx="50" cy="50" r="49" fill="#08080C"/>
  <!-- Brass annulus -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="url(#brass)" stroke-width="2.8"/>
  <!-- Halving notches at compass quadrants (steampunk halving-epoch detail) -->
  <rect x="49" y="1" width="2" height="5" fill="#E0A656"/>
  <rect x="49" y="94" width="2" height="5" fill="#E0A656"/>
  <rect x="1" y="49" width="5" height="2" fill="#E0A656"/>
  <rect x="94" y="49" width="5" height="2" fill="#E0A656"/>
  <!-- Diagonal accent notches (smaller) -->
  <circle cx="22.5" cy="22.5" r="1.4" fill="#8C5E29"/>
  <circle cx="77.5" cy="22.5" r="1.4" fill="#8C5E29"/>
  <circle cx="22.5" cy="77.5" r="1.4" fill="#8C5E29"/>
  <circle cx="77.5" cy="77.5" r="1.4" fill="#8C5E29"/>
  <!-- Gold glow under nodes -->
  <circle cx="50" cy="50" r="42" fill="url(#goldGlow)"/>
  <!-- Force-directed edges first (under nodes) -->
  <g stroke="#C28840" stroke-linecap="round" fill="none">
    <line x1="50" y1="50" x2="28" y2="30" stroke-width="1.5" opacity="0.75"/>
    <line x1="50" y1="50" x2="72" y2="28" stroke-width="1.5" opacity="0.75"/>
    <line x1="50" y1="50" x2="78" y2="58" stroke-width="1.5" opacity="0.75"/>
    <line x1="50" y1="50" x2="55" y2="78" stroke-width="1.5" opacity="0.75"/>
    <line x1="50" y1="50" x2="22" y2="62" stroke-width="1.5" opacity="0.75"/>
    <!-- inter-peripheral edges (graph-like, not just hub-and-spoke) -->
    <line x1="28" y1="30" x2="72" y2="28" stroke-width="0.8" opacity="0.45"/>
    <line x1="22" y1="62" x2="55" y2="78" stroke-width="0.8" opacity="0.45"/>
    <line x1="78" y1="58" x2="55" y2="78" stroke-width="0.8" opacity="0.45"/>
  </g>
  <!-- Peripheral nodes (brass-bright with gold glow) -->
  <g fill="#E0A656" stroke="#FFD700" stroke-width="0.8">
    <circle cx="28" cy="30" r="4"/>
    <circle cx="72" cy="28" r="4"/>
    <circle cx="78" cy="58" r="4.2"/>
    <circle cx="55" cy="78" r="3.8"/>
    <circle cx="22" cy="62" r="4"/>
  </g>
  <!-- Center Satoshi node — gold with Bitcoin symbol -->
  <circle cx="50" cy="50" r="11" fill="#FFD700"/>
  <text x="50" y="56" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#08080C">₿</text>
  <!-- Highlight crescent on center node (depth) -->
  <path d="M 43 46 A 8 8 0 0 1 57 46" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
